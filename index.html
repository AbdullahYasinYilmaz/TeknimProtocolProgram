<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/mainLayout.css">
    <title>Document</title>
</head>
<body>
    
    <div class="content">

        <div class="configuration-container">
            <div class="mode-selection-container">
                <button id="manual-mode-button">Manual</button>
                <button id="automatic-mode-button">Automatic</button>
            </div>
            <div class="connection-settings-container" data-connected="false">
                <div class="baud-rate-container">
                    <div class="baud-rate-top-container">
                    <label for="baud-rates">Baudrate</label>
                        <select name="baud-rates" id="baud-rate-selection">
                            <option value="4800">4800</option>
                            <option value="9600">9600</option>
                            <option value="19200">19200</option>
                            <option value="38400">38400</option>
                            <option value="57600">57600</option>
                            <option value="115200">115200</option>
                            <option value="230400">230400</option>
                            <option value="460800">460800</option>
                            <option value="921600">921600</option>
                            <option value="1500000">1500000</option>
                            <option value="custom">Custom (default 9600)</option>
                        </select>
                    </div>
                    <div class="baud-rate-bottom-container">
                        <input type="text" id="custom-baud-rate-input" disabled>
                    </div>
                </div>
                <div class="connection-settings-right-side-container">
                    <div class="connection-buttons-container">
                        <button id="connectBtn">Connect</button>
                        <button id="disconnectBtn">Disconnect</button>
                    </div>
                    <div class="connection-signifier-container">
                        <span id="connection-light-span"></span>
                        <span id="connection-text-span">Not Connected</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="main-content-container" data-open_window = 1>
            <div class="main-cover-container" data-port_open = "true">
                <div class="main-cover">Port not open</div>
            </div>
            <div class="manual-command-container">
                <div class="manual-text-fields-container">
                    <div aria-hidden="true"></div>
                    <textarea name="InputDataArea" id="inputField" placeholder="Enter Hex String no commas(Ex: 4a Bf62)"></textarea>
                    <textarea name="OutputDataArea" id="outputField" readonly placeholder="Output"></textarea>
                </div>
                <div class="manual-button-container">
                    <button id="dataSendBtn">Send Data</button>
                </div>
            </div>
            <div class="automatic-command-container">

            </div>
        </div>

        </div>
    </div>

</body>

<script src="src/index.js" type="module"></script>
</html>
